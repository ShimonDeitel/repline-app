name: Repline
options:
  bundleIdPrefix: com.shimondeitel.repline
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Repline:
    type: application
    platform: iOS
    sources:
      - path: Repline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.repline
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Repline/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  ReplineTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ReplineTests
      - path: Repline.storekit
    dependencies:
      - target: Repline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.repline.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  ReplineUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ReplineUITests
    dependencies:
      - target: Repline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.repline.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Repline:
    build:
      targets:
        Repline: all
        ReplineTests: [test]
        ReplineUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Repline.storekit
    test:
      config: Debug
      storeKitConfiguration: Repline.storekit
      targets:
        - ReplineTests
        - ReplineUITests
    archive:
      config: Release
